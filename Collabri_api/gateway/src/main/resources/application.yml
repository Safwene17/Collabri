spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://localhost:8888

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html # http://localhost:8222/swagger-ui.html to see all the API
    config-url: /v3/api-docs/swagger-config
    urls:
      - url: /user/v3/api-docs
        name: User Service
      - url: /calendar/v3/api-docs
        name: Calendar Service
      - url: /notification/v3/api-docs
        name: Notification Service
